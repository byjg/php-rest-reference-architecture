name: Create Project

# End-to-end test of `composer create-project byjg/gluo`: creates a project
# from the current commit (unattended setup.json mode), which resolves
# byjg/gluo-core and every other dependency from Packagist — the only test
# able to catch dependency-resolution problems the local suite can't see.
# Runs the full option matrix (full-stack and pure-API).
#
# This workflow belongs to the reference repository only: PostCreateScript
# removes it (together with itself) from generated projects.

on:
  push:
    branches:
      - master
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - master

jobs:
  CreateProject:
    runs-on: 'ubuntu-latest'
    container:
      image: 'byjg/php:8.5-cli'
      options: --user root --privileged

    strategy:
      matrix:
        include:
          - combo: full-stack
            install_frontend: true
            install_examples: true
          - combo: pure-api
            install_frontend: false
            install_examples: false

    services:
      mysql-container:
        image: mysql:8.0.20
        env:
          MYSQL_ROOT_PASSWORD: mysqlp455w0rd
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=20s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare source branch for create-project
        run: |
          git config --global --add safe.directory '*'
          git branch -f ci-under-test HEAD

      - name: Write unattended setup.json
        run: |
          cat > /tmp/setup.json <<EOF
          {
            "git_user_name": "CI",
            "git_user_email": "ci@example.com",
            "php_version": "8.5",
            "namespace": "AcmeShop",
            "composer_name": "acme/shop",
            "timezone": "UTC",
            "install_frontend": ${{ matrix.install_frontend }},
            "install_examples": ${{ matrix.install_examples }},
            "db_schema": "mysql",
            "db_host": "mysql-container",
            "db_user": "root",
            "db_password": "mysqlp455w0rd",
            "db_name_dev": "localdev",
            "db_name_test": "localtest"
          }
          EOF

      - name: composer create-project
        env:
          SETUP_JSON: /tmp/setup.json
        run: >
          composer create-project byjg/gluo:dev-ci-under-test /tmp/my-api
          --repository="{\"type\":\"vcs\",\"url\":\"file://$GITHUB_WORKSPACE\"}"
          --stability=dev
          --no-interaction

      - name: Assert structure (${{ matrix.combo }})
        run: |
          test -f /tmp/my-api/api/composer.json
          test ! -f /tmp/my-api/api/builder/PostCreateScript.php
          if [ "${{ matrix.install_frontend }}" = "true" ]; then
            test -d /tmp/my-api/html
            grep -q "html:" /tmp/my-api/docker-compose.yml
          else
            test ! -d /tmp/my-api/html
            ! grep -q "gluo-html" /tmp/my-api/docker-compose.yml
          fi

      - name: Psalm on the generated project
        working-directory: /tmp/my-api/api
        run: ./vendor/bin/psalm

      - name: PHPUnit on the generated project
        working-directory: /tmp/my-api/api
        run: ./vendor/bin/phpunit

      - name: Frontend build (full-stack only)
        if: matrix.install_frontend == true
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        if: matrix.install_frontend == true
        working-directory: /tmp/my-api/html
        run: npm install && npm run build
